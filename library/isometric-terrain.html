<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isometric Terrain</title>
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="./base.css" />
  <style>
    :root {
      --iso-tile-w: 120px;
      --iso-tile-h: 60px;
      --iso-depth: 32px;
      --iso-lift-a: 18px;
      --iso-lift-b: 12px;
      --iso-lift-c: 24px;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at top, color-mix(in srgb, var(--brand-secondary) 12%, transparent), transparent 42%),
        var(--bg-main);
    }

    .iso-scene {
      position: relative;
      width: min(92vw, 760px);
      height: min(72vw, 560px);
      perspective: 1200px;
    }

    .iso-grid {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -46%) rotateX(58deg) rotateZ(45deg);
      transform-style: preserve-3d;
      width: calc(var(--iso-tile-w) * 3);
      height: calc(var(--iso-tile-w) * 3);
    }

    .iso-tile {
      position: absolute;
      width: var(--iso-tile-w);
      height: var(--iso-tile-w);
      transform-style: preserve-3d;
      animation: float-tile 5.8s ease-in-out infinite;
      animation-delay: calc(var(--delay) * 1ms);
    }

    .iso-face {
      position: absolute;
      inset: 0;
      border: 1px solid color-mix(in srgb, var(--text-main) 10%, transparent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--brand-primary) 4%, transparent);
    }

    .iso-face--top {
      background: color-mix(in srgb, var(--surface-2) 68%, var(--brand-primary) 32%);
      transform: translateZ(var(--iso-depth));
    }

    .iso-face--left {
      background: color-mix(in srgb, var(--surface-1) 84%, var(--brand-secondary) 16%);
      transform-origin: left center;
      transform: rotateY(90deg) translateZ(calc(var(--iso-tile-w) / 2)) translateX(calc(var(--iso-tile-w) / -2));
      width: var(--iso-depth);
    }

    .iso-face--right {
      background: color-mix(in srgb, var(--surface-offset) 88%, var(--brand-primary) 12%);
      transform-origin: right center;
      transform: rotateX(-90deg) translateZ(calc(var(--iso-tile-w) / 2)) translateY(calc(var(--iso-tile-w) / 2));
      height: var(--iso-depth);
    }

    @keyframes float-tile {
      0%, 100% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(0, 0, calc(var(--lift) * 1px));
      }
    }
  </style>
</head>
<body>
  <section class="iso-scene" aria-label="Isometric Terrain component">
    <div class="iso-grid">
      <div class="iso-tile" style="left:0; top:0; --lift:18; --delay:0; animation-duration:5.6s;">
        <span class="iso-face iso-face--top"></span><span class="iso-face iso-face--left"></span><span class="iso-face iso-face--right"></span>
      </div>
      <div class="iso-tile" style="left:120px; top:0; --lift:10; --delay:320; animation-duration:6.4s;">
        <span class="iso-face iso-face--top"></span><span class="iso-face iso-face--left"></span><span class="iso-face iso-face--right"></span>
      </div>
      <div class="iso-tile" style="left:240px; top:0; --lift:22; --delay:680; animation-duration:5.2s;">
        <span class="iso-face iso-face--top"></span><span class="iso-face iso-face--left"></span><span class="iso-face iso-face--right"></span>
      </div>

      <div class="iso-tile" style="left:0; top:120px; --lift:14; --delay:240; animation-duration:6.8s;">
        <span class="iso-face iso-face--top"></span><span class="iso-face iso-face--left"></span><span class="iso-face iso-face--right"></span>
      </div>
      <div class="iso-tile" style="left:120px; top:120px; --lift:28; --delay:120; animation-duration:5.4s;">
        <span class="iso-face iso-face--top"></span><span class="iso-face iso-face--left"></span><span class="iso-face iso-face--right"></span>
      </div>
      <div class="iso-tile" style="left:240px; top:120px; --lift:16; --delay:540; animation-duration:6.1s;">
        <span class="iso-face iso-face--top"></span><span class="iso-face iso-face--left"></span><span class="iso-face iso-face--right"></span>
      </div>

      <div class="iso-tile" style="left:0; top:240px; --lift:24; --delay:760; animation-duration:5.9s;">
        <span class="iso-face iso-face--top"></span><span class="iso-face iso-face--left"></span><span class="iso-face iso-face--right"></span>
      </div>
      <div class="iso-tile" style="left:120px; top:240px; --lift:12; --delay:430; animation-duration:6.6s;">
        <span class="iso-face iso-face--top"></span><span class="iso-face iso-face--left"></span><span class="iso-face iso-face--right"></span>
      </div>
      <div class="iso-tile" style="left:240px; top:240px; --lift:20; --delay:880; animation-duration:5.1s;">
        <span class="iso-face iso-face--top"></span><span class="iso-face iso-face--left"></span><span class="iso-face iso-face--right"></span>
      </div>
    </div>
  </section>
</body>
</html>
